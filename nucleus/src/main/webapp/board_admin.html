<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 관리</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js"></script>
</head>
<body onload="if (requireLogin()) { if (getRole() !== 'admin') { alert('관리자만 접근할 수 있습니다.'); location.href='board_view.html'; return; } updateRoleUI(); renderBoardView(); }">
  <div class="page-shell">
    <header class="layout-header">
      <div>
        <h1 class="page-title">게시글 관리 화면</h1>
        <p class="page-subtitle">관리자는 작성, 수정, 삭제 기능을 사용할 수 있습니다.</p>
      </div>
      <div class="top-actions">
        <button class="btn btn-ghost" onclick="location.href='board_list.html'">목록으로</button>
      </div>
    </header>
    <section class="board-view">
      <h2 data-post-title>게시글 제목</h2>
      <div class="board-meta">
        <span>게시글 번호: <strong data-post-id></strong></span>
        <span>작성자: <strong data-post-author></strong></span>
        <span>작성일: <strong data-post-date></strong></span>
      </div>
      <div class="board-body">관리자 상세 화면입니다.
조회 화면에 작성, 수정, 삭제 버튼이 추가됩니다.</div>
      <div class="file-box">
        <strong>첨부파일</strong>
        <p class="muted" data-post-file></p>
        <div class="actions">
          <button class="btn btn-secondary" type="button">첨부파일 다운로드</button>
          <button class="btn btn-primary" type="button">작성</button>
          <button class="btn btn-ghost" type="button">수정</button>
          <button class="btn btn-danger" type="button">삭제</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
