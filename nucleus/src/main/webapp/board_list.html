<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판 목록</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js"></script>
</head>
<body onload="if (requireLogin()) { updateRoleUI(); renderBoardTable('boardTableBody'); }">
  <div class="page-shell">
    <header class="layout-header">
      <div>
        <h1 class="page-title">게시판 목록</h1>
        <p class="page-subtitle">게시글을 클릭하면 권한에 맞는 상세 화면으로 이동합니다.</p>
      </div>
      <div class="top-actions">
        <span class="pill" data-role-label></span>
        <button class="btn btn-ghost" onclick="location.href='main.html'">메인으로</button>
      </div>
    </header>
    <section class="table-card">
      <table>
        <thead>
          <tr><th>번호</th><th>제목</th><th>작성자</th><th>작성일</th><th>조회수</th></tr>
        </thead>
        <tbody id="boardTableBody"></tbody>
      </table>
    </section>
    <div class="pagination">
      <span class="page-pill active">1</span>
      <span class="page-pill">2</span>
      <span class="page-pill">3</span>
    </div>
  </div>
</body>
</html>
